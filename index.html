<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Larpssix</title>
    <link rel="stylesheet" href="style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(180deg,#080808,#161616,#090909);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
        }

        .container{
            max-width:700px;
            padding:30px;
        }

        h1{
            font-size:3rem;
            margin-bottom:10px;
            letter-spacing:3px;
        }

        h2{
            font-size:2rem;
            margin-bottom:25px;
            color:#ff3d3d;
        }

        img{
            width:320px;
            max-width:90%;
            border-radius:14px;
            box-shadow:0 0 30px rgba(255,0,0,.4);
            transition:.3s;
        }

        img:hover{
            transform:scale(1.03);
        }

        .listen{
            display:inline-block;
            margin-top:30px;
            padding:16px 45px;
            background:#ff2d2d;
            color:white;
            text-decoration:none;
            border-radius:50px;
            font-size:1.3rem;
            font-weight:bold;
            transition:.25s;
        }

        .listen:hover{
            background:#ff5555;
            transform:scale(1.08);
        }

        footer{
            margin-top:60px;
            opacity:.45;
            font-size:.9rem;
            line-height:1.8;
        }

        .secret{
            margin-top:15px;
            background:none;
            border:none;
            color:#555;
            cursor:pointer;
            font-size:.75rem;
            transition:.3s;
        }

        .secret:hover{
            color:#aaa;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>LARPSSIX</h1>

    <h2>SINGLE NOVO, COPIA NÃO LIXO</h2>

    <img src="capacopia.png" alt="Capa do Single">

    <br>

<div class="player">

    <iframe
        src="https://www.youtube.com/embed/rbiT7fGhKCI"
        title="Larpssix - COPIA NÃO LIXO"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>

    <a class="youtube-button"
       href="https://youtu.be/rbiT7fGhKCI"
       target="_blank"
       title="Abrir no YouTube">

        <svg xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24"
             width="22"
             height="22"
             fill="white">
            <path d="M23.5 6.2s-.2-1.7-.9-2.4c-.9-.9-1.9-.9-2.4-1C16.8 2.5 12 2.5 12 2.5h0s-4.8 0-8.2.3c-.5.1-1.5.1-2.4 1C.7 4.5.5 6.2.5 6.2S.2 8.1.2 10v1.9c0 1.9.3 3.8.3 3.8s.2 1.7.9 2.4c.9.9 2 .9 2.5 1 1.8.2 7.6.3 8.1.3s4.8 0 8.2-.3c.5-.1 1.5-.1 2.4-1 .7-.7.9-2.4.9-2.4s.3-1.9.3-3.8V10c0-1.9-.3-3.8-.3-3.8zM9.7 15.2V8.8L16 12l-6.3 3.2z"/>
        </svg>

    </a>

</div>

</div>

<footer>

    © 2026 Larpssix Entertainment™<br>
    Larps Studios™<br>
    Entre Outros™<br>
    Todos Direitos Reservados™<br>

    <br>

    <button class="secret"
        onclick="window.location.href='https://www.youtube.com/watch?app=desktop&v=dQw4w9WgXcQ'">
        Quem somos Nós
    </button>

</footer>

</body>
</html>
